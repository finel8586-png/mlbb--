<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Tactical Cooldown Board v6</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --panel-bg: #1e293b;
            --accent-color: #3b82f6;
            --text-color: #f8fafc;
            --cooldown-color: #ef4444;
            --success-color: #10b981;
            --purple-color: #a855f7;
            --gold-color: #fbbf24;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        h2 { text-align: center; color: #38bdf8; margin: 5px 0 15px 0; font-size: 22px; }
        
        .mode-navigation { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .mode-btn {
            background-color: var(--card-bg); color: #94a3b8; border: 1px solid #273549;
            padding: 10px 16px; cursor: pointer; font-weight: bold; border-radius: 6px; transition: 0.2s; font-size: 14px;
        }
        .mode-btn.active { background-color: var(--accent-color); color: white; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        #btn-mode-learn.active { background-color: var(--purple-color); box-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }

        /* Поиск и категории на драфте */
        .search-container { max-width: 900px; margin: 0 auto 15px auto; display: flex; flex-direction: column; gap: 10px; }
        .search-input { width: 100%; padding: 10px 15px; background: #151f32; border: 1px solid #273549; border-radius: 6px; color: white; font-size: 14px; box-sizing: border-box; }
        .search-input:focus { border-color: var(--accent-color); outline: none; }

        .class-filters { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-bottom: 15px; }
        .filter-btn {
            background: #1e293b; color: #cbd5e1; border: 1px solid #475569;
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.1s;
        }
        .filter-btn.active { background: #38bdf8; color: #0b0f19; border-color: #38bdf8; }
        .filter-btn.learn-active { background: var(--purple-color); color: white; border-color: var(--purple-color); }

        /* Общая панель настроек боя */
        .mass-control-panel {
            background-color: #162235; border: 1px solid #23354f; border-radius: 8px; padding: 10px 15px; max-width: 1100px; margin: 0 auto 15px auto;
            display: flex; flex-direction: column; gap: 10px;
        }
        .mass-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .mass-title { font-size: 13px; font-weight: bold; color: #cbd5e1; }

        .screen { display: none; }
        .screen.active { display: block; }

        .heroes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 10px; max-width: 900px; margin: 0 auto; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 12px; max-width: 1100px; margin: 0 auto; }

        /* Карточки драфта */
        .hero-picker-card { background-color: var(--card-bg); border: 1px solid #273549; border-radius: 8px; padding: 8px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; height: 90px; box-sizing: border-box; }
        .hero-picker-card.selected { border-color: var(--accent-color); background: #1a2942; }
        .hero-name-click { font-weight: bold; font-size: 13px; margin-bottom: 4px; cursor: pointer; padding: 6px; background: #1e293b; border-radius: 4px; user-select: none; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .hero-picker-card.selected .hero-name-click { background: var(--accent-color); color: white; }
        .spell-select { width: 100%; padding: 3px; background: #0b0f19; color: white; border: 1px solid #273549; border-radius: 4px; font-size: 11px; }
        
        .action-btn { display: block; width: 220px; margin: 20px auto; padding: 12px; background-color: var(--success-color); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; }

        /* Карточки боя */
        .match-card { background-color: var(--card-bg); border-radius: 8px; padding: 12px; border-left: 4px solid var(--cooldown-color); display: flex; flex-direction: column; gap: 8px; }
        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .hero-name { font-size: 15px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .gossen-easter { font-size: 11px; color: var(--gold-color); font-weight: 900; background: rgba(251, 191, 36, 0.15); padding: 1px 4px; border-radius: 3px; border: 1px solid rgba(251, 191, 36, 0.3); }
        .hero-class-badge { font-size: 10px; background: #334155; padding: 2px 6px; border-radius: 4px; color: #94a3b8; align-self: flex-start; }
        
        .level-selector { display: flex; gap: 2px; background: #0b0f19; padding: 2px; border-radius: 4px; }
        .lvl-btn { background: none; border: none; color: #64748b; font-size: 11px; padding: 2px 5px; cursor: pointer; font-weight: bold; border-radius: 3px; }
        .lvl-btn.active { background: var(--accent-color); color: white; }
        .lvl-btn.active-cd { background: var(--success-color); color: white; }

        /* Контейнер регулировки КД */
        .hero-cd-modifier { background: #111827; border-radius: 6px; padding: 8px 10px; display: flex; flex-direction: column; gap: 4px; }
        .cd-slider-header { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #94a3b8; }
        .cd-slider-body { display: flex; align-items: center; gap: 10px; width: 100%; }
        .slider-wrapper { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* Отметки над ползунком */
        .slider-ticks { display: flex; justify-content: space-between; padding: 0 4px; margin-bottom: 2px; font-size: 9px; color: #64748b; font-weight: bold; user-select: none; }
        .slider-ticks span { position: relative; text-align: center; }

        .hero-cd-modifier input[type="range"] { width: 100%; accent-color: var(--success-color); cursor: pointer; height: 4px; margin: 0; padding: 0; }
        .cd-total-badge { background: #1f2937; color: #10b981; font-weight: bold; padding: 2px 5px; border-radius: 4px; font-size: 12px; border: 1px solid #374151; min-width: 32px; text-align: center; }
        
        .skills-compact-row { display: flex; gap: 8px; }
        .skill-timer-btn { flex: 1; background: #1e293b; border: 1px solid #273549; color: white; padding: 8px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .skill-timer-btn.cooldown { background: #3b1414; border-color: #7f1d1d; }
        .time-counter { font-size: 15px; font-weight: bold; color: #fca5a5; display: flex; align-items: center; gap: 5px; }
        .reset-x { background: #7f1d1d; border: none; color: white; border-radius: 3px; padding: 0 4px; font-size: 10px; }

        .static-info-block { flex: 1; background: #1a2436; border: 1px solid #2d3d56; padding: 8px; border-radius: 6px; text-align: center; }
        .static-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-bottom: 2px; }
        .static-time { font-size: 18px; font-weight: bold; color: #38bdf8; }
    </style>
</head>

        function levenshtein(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) matrix[i] = [i];
            for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        function buildDraftPool() {
            const pool = document.getElementById('heroes-pool');
            pool.innerHTML = '';
            const searchText = document.getElementById('draft-search').value.toLowerCase().trim();
            let processedList = [...heroesDatabase].sort((a, b) => a.name.localeCompare(b.name));

            if (currentDraftFilter !== 'all') {
                processedList = processedList.filter(h => h.role === currentDraftFilter);
            }

            if (searchText.length > 0) {
                processedList = processedList.filter(hero => {
                    if (hero.name.toLowerCase().includes(searchText)) return true;
                    if (hero.aliases.some(alias => alias.includes(searchText))) return true;
                    const words = hero.name.toLowerCase().split(' ');
                    for (let word of words) {
                        if (levenshtein(word, searchText) <= 1) return true;
                    }
                    for (let alias of hero.aliases) {
                        if (levenshtein(alias, searchText) <= 1) return true;
                    }
                    return false;
                });
            }

            processedList.forEach(hero => {
                const isSelected = selectedHeroes.some(h => h.id === hero.id);
                const card = document.createElement('div');
                card.className = `hero-picker-card ${isSelected ? 'selected' : ''}`;
                let options = Object.keys(spellsDatabase).map(k => `<option value="${k}">${spellsDatabase[k].name}</option>`).join('');

        // ЛОГИКА ТАЙМЕРОВ
        function attachTimerLogic(hState, skillType, baseCd) {
            const btn = document.getElementById(`t-btn-${skillType}-${hState.id}`);
            const display = document.getElementById(`t-val-${skillType}-${hState.id}`);
            const tKey = `${hState.id}-${skillType}`;
            let finalCd = calculateFinalCd(hState, baseCd);

            if (activeTimers[tKey]) {
                btn.classList.add('cooldown');
                display.innerHTML = `${activeTimers[tKey].timeLeft}с <button class="reset-x" data-key="${tKey}">X</button>`;
            } else {
                btn.classList.remove('cooldown');
                display.innerText = 'Ready';
            }

            btn.onclick = (e) => {
                if (e.target.classList.contains('reset-x')) {
                    clearInterval(activeTimers[tKey].intervalId);
                    delete activeTimers[tKey];
                    btn.classList.remove('cooldown');
                    display.innerText = 'Ready';
                    return;
                }
                if (btn.classList.contains('cooldown')) return;
                btn.classList.add('cooldown');
                
                activeTimers[tKey] = {
                    timeLeft: finalCd,
                    intervalId: setInterval(() => {
                        if (!activeTimers[tKey]) return;
                        activeTimers[tKey].timeLeft--;
                        if (activeTimers[tKey].timeLeft <= 0) {
                            clearInterval(activeTimers[tKey].intervalId);
                            delete activeTimers[tKey];
                            const activeBtn = document.getElementById(`t-btn-${skillType}-${hState.id}`);
                            const activeDisp = document.getElementById(`t-val-${skillType}-${hState.id}`);
                            if (activeBtn && activeDisp) {
                                activeBtn.classList.remove('cooldown');
                                activeDisp.innerText = 'Ready';
                            }
                        } else {
                            const activeDisp = document.getElementById(`t-val-${skillType}-${hState.id}`);
                            if (activeDisp) activeDisp.innerHTML = `${activeTimers[tKey].timeLeft}с <button class="reset-x">X</button>`;
                        }
                    }, 1000)
                };
                display.innerHTML = `${activeTimers[tKey].timeLeft}с <button class="reset-x">X</button>`;
            };
        }
    </script>
</body>
</html>
